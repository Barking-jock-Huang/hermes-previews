<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hermes Preview Gallery</title>
    <meta
      name="description"
      content="Public static preview gallery for Hermes-generated pages and assets."
    >
    <link rel="stylesheet" href="./assets/shared.css">
  </head>
  <body>
    <header class="site-header">
      <div class="shell">
        <a class="brand" href="./" aria-label="Hermes Preview Gallery home">
          <span class="brand-mark" aria-hidden="true">H</span>
          <span>Hermes Preview Gallery</span>
        </a>
      </div>
    </header>

    <main class="site-main">
      <section class="shell" aria-labelledby="gallery-title">
        <h1 class="page-title" id="gallery-title">Hermes Preview Gallery</h1>
        <p class="lede">
          靜態預覽頁集中存放處。每個作品都有自己的資料夾，GitHub Pages 會直接公開成可分享網址。
        </p>

        <div class="toolbar" aria-label="Gallery status">
          <strong>Published previews</strong>
          <span class="count">1 preview</span>
        </div>

        <ul class="preview-grid">
          <li class="preview-card">
            <a href="./2026-05-13-expo-omo-system/">
              <span class="preview-thumb" aria-hidden="true">
                <svg viewBox="0 0 240 112" role="img">
                  <rect x="12" y="20" width="64" height="30" rx="6" fill="#0b5058"></rect>
                  <rect x="88" y="20" width="64" height="30" rx="6" fill="#116f79"></rect>
                  <rect x="164" y="20" width="64" height="30" rx="6" fill="#996515"></rect>
                  <rect x="50" y="70" width="64" height="30" rx="6" fill="#334155"></rect>
                  <rect x="126" y="70" width="64" height="30" rx="6" fill="#4b5d67"></rect>
                  <path d="M76 35h12M152 35h12M120 50v20M88 85h38" stroke="#73808f" stroke-width="4" stroke-linecap="round"></path>
                </svg>
              </span>
              <span class="preview-body">
                <h2>展會 OMO 智慧平台系統圖</h2>
                <span class="preview-meta">
                  <span class="pill">html-infographic</span>
                  <span class="pill">2026-05-13</span>
                </span>
              </span>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell">
        <span>Hermes previews, <span data-current-year>2026</span></span>
      </div>
    </footer>

    <script src="./assets/shared.js"></script>
  </body>
</html>
